# AquaForge Scoring Rules
# Machine-readable constraints for optimization engine
# Last Updated: 2026-01-15
# Location: docs/ to avoid gitignore issues with .agent/ yaml files

---
# Dual Meet Scoring (current default)
dual_meet:
  name: "Standard Dual Meet"
  points_by_place:
    1: 6
    2: 4
    3: 3
    4: 2
    5: 1
    6: 0
  max_scorers_per_team: 3
  max_events_per_swimmer: 2  # individual events
  relays_separate: true      # relays don't count toward limit
  relay_multiplier: 2        # relay points worth 2x

---
# VISAA Championship Scoring
visaa_championship:
  name: "VISAA State Championship"
  
  championship_finals:
    # Places 1-16 in Championship Final
    1: 40
    2: 34
    3: 32
    4: 30
    5: 28
    6: 26
    7: 24
    8: 22
    9: 18
    10: 14
    11: 12
    12: 10
    13: 8
    14: 6
    15: 4
    16: 2
  
  consolation_finals:
    # Places 1-16 in Consolation Final
    1: 20
    2: 17
    3: 16
    4: 15
    5: 14
    6: 13
    7: 12
    8: 11
    9: 9
    10: 7
    11: 6
    12: 5
    13: 4
    14: 3
    15: 2
    16: 1
  
  bonus_heats_score: false  # Bonus event swimmers cannot score
  format: "prelims_finals"
  max_entries_per_event: 3   # per team
  max_events_per_swimmer: 2  # individual events
  relay_multiplier: 2

---
# Grade-Based Scoring Eligibility
grade_rules:
  exhibition_grades: [7, 8]   # Can compete, cannot score
  scoring_grades: [9, 10, 11, 12]  # Full scoring eligibility
  
  exhibition_rules:
    can_compete: true
    can_displace: true       # Push opponents to lower places
    scores_points: false
    counts_toward_limit: true  # Still uses 2-event limit

---
# Relay Configuration
relays:
  swimmers_per_relay: 4
  events:
    - name: "200 Medley Relay"
      legs: ["backstroke", "breaststroke", "butterfly", "freestyle"]
    - name: "200 Free Relay"
      legs: ["freestyle", "freestyle", "freestyle", "freestyle"]
    - name: "400 Free Relay"
      legs: ["freestyle", "freestyle", "freestyle", "freestyle"]
  
  # Relay times vs individual times (typical ratio)
  relay_split_factor: 0.98  # Relay splits ~2% faster than individual

---
# Fatigue Model
fatigue:
  enabled: true
  per_event_penalty: 0.02   # 2% slowdown per additional event
  relay_penalty: 0.01       # 1% for relay participation
  max_penalty: 0.05         # Cap at 5% total fatigue
