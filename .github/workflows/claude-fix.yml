name: Claude Bug Fixer

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-fix:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      
      - name: Claude Fix Bug
        uses: anthropic-ai/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          
          # Mode for fixing bugs from issues
          mode: implement
          
          # Get issue details
          issue_number: ${{ github.event.issue.number }}
          
          # Use our project context
          claude_md_path: "CLAUDE.md"
          
          # Instructions for the fix
          prompt: |
            Please analyze and fix the bug described in this issue.
            
            Steps:
            1. Understand the bug from the issue description
            2. Find the relevant code
            3. Write a test that reproduces the bug (if not exists)
            4. Fix the bug
            5. Verify tests pass
            6. Create a pull request with the fix
            
            Follow our coding standards from CLAUDE.md.
            Run: python -m pytest tests/ -v to verify tests pass.
          
          # Create PR with fix
          create_pr: true
          pr_title: "fix: ${{ github.event.issue.title }}"
          pr_body: |
            Fixes #${{ github.event.issue.number }}
            
            This fix was generated by Claude Code.
            
            Please review carefully before merging.
