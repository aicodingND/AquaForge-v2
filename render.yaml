services:
  - type: web
    name: aquaforge
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8080"
      - key: API_PORT
        value: "8001"
      - key: CORS_ALLOW_ALL
        value: "false"
      # Gurobi WLS credentials - set these in Render dashboard
      - key: WLSACCESSID
        sync: false
      - key: WLSSECRET
        sync: false
      - key: LICENSEID
        sync: false
      # Sentry (optional) - set in Render dashboard
      - key: SENTRY_DSN
        sync: false
    healthCheckPath: /api/v1/health
    autoDeploy: true
