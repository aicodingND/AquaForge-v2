# Railway deployment config for Reflex
[phases.setup]
nixPkgs = ["python311", "nodejs_20", "bun", "unzip", "libpq", "cairo", "pkg-config"]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "reflex init"
]

[start]
cmd = "reflex export --frontend-only --no-zip && caddy start --config Caddyfile & reflex run --env prod --backend-only --loglevel warning"
