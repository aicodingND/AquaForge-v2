version: '3.8'

services:
  # Development backend (FastAPI on port 8001)
  backend-dev:
    build:
      context: .
      target: production
    container_name: aquaforge-backend-dev
    profiles: ["dev"]
    ports:
      - "8001:8001"
    volumes:
      - type: bind
        source: ./swim_ai_reflex
        target: /app/swim_ai_reflex
      - type: bind
        source: ./uploads
        target: /app/uploads
      - type: bind
        source: ./assets
        target: /app/assets
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - CORS_ALLOW_ALL=true
    command: python run_server.py --mode api --port 8001 --reload
    restart: unless-stopped

  # Development frontend (Next.js on port 3000)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aquaforge-frontend-dev
    profiles: ["dev"]
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: ./frontend/src
        target: /app/src
      - type: bind
        source: ./frontend/public
        target: /app/public
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
      - NEXT_PUBLIC_API_URL_V2=http://localhost:8001/api/v2
      - NODE_ENV=development
    restart: unless-stopped

  # Production service (Caddy reverse-proxies frontend + API on a single port)
  aquaforge:
    build:
      context: .
    container_name: aquaforge-app
    profiles: ["prod"]
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./uploads:/app/uploads:rw
      - ./assets:/app/assets:ro
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - CORS_ALLOW_ALL=false
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - PORT=${PORT:-8080}
    command: /bin/bash /app/start.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: aquaforge-db
    profiles: ["db"]
    environment:
      POSTGRES_DB: aquaforge
      POSTGRES_USER: aquaforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aquaforge_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  frontend_node_modules:
    driver: local
